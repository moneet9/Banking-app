name: Banking App CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # You can adjust to your specific Node.js version
        cache: 'npm'
        cache-dependency-path: '**/package.json'

    # Backend Setup
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    # Frontend Setup
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    # Build Frontend (Vite)
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
